name: Docs Freshness

on:
  push:
  pull_request:

jobs:
  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML 2>/dev/null || true

      - name: Run unit tests
        run: {{TEST_COMMAND}}

      - name: Check docs freshness
        run: python scripts/check_docs_freshness.py --base HEAD~1 --head HEAD
